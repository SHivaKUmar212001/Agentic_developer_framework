# Copy this file to forge.yaml in the target project repo.

model: claude-sonnet-4-20250514
max_retries: 3
max_fix_retries: 3
skip_tests: false
skip_review: false
parallel: true

agents:
  planner:
    temperature: 0.4

  coder:
    temperature: 0.2
    max_tokens: 16384

  reviewer:
    temperature: 0.1

  tester:
    temperature: 0.2

  fixer:
    temperature: 0.1

